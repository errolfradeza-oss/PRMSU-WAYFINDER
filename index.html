<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WAYFINDER – Campus Navigation</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="intro2.css" />
</head>
<body>

  <div class="bg-map"></div>
  <div class="route-line line-1"></div>
  <div class="route-line line-2"></div>
  <div class="route-line line-3"></div>

  <div class="route-dots">
    <div class="dot dot-1"></div>
    <div class="dot dot-2"></div>
    <div class="dot dot-3"></div>
    <div class="dot dot-4"></div>
  </div>

  <section class="screen active" id="s1" onclick="next(1)">
    <div class="scene scene-1">
      <img src="introImg/prmsurgh.png" class="scene-bg prmsu-behind-arc" />
      <img src="introImg/Arc.png" class="scene-bg arc-bg" />
      <div class="tap-hint">Click anywhere to continue</div>
      <img src="introImg/WayFinder_Logo.png" class="logo-center" />
    </div>
  </section>

  <section class="screen" id="s2" onclick="next(2)">
    <div class="scene scene-2">
      <img src="introImg/prmsurgh.png" alt="PRMSU with Statue" class="scene-bg prmsu-bg" />

      <div class="screen2-content" id="screen2Content">
        <h1>Navigate with Ease</h1>

        <div class="cards">
          <div class="card">📍 Search any building or office</div>
          <div class="card">🗺️ View campus map with routes</div>
          <div class="card">🚶 Step-by-step directions</div>
          <div class="card">🎓 Perfect for new students and visitors</div>
        </div>
      </div>

      <div class="tap-hint">Click anywhere to continue</div>
    </div>
  </section>

  <section class="screen" id="s3" onclick="goLogin()">
    <div class="scene scene-3">
      <img src="introImg/mainbuilding.png" alt="Main Building" class="scene-bg building-bg" />

      <div class="screen3-ui" id="screen3UI">
        <img src="introImg/WayFinder_Logo.png" alt="WayFinder Logo" class="logo-left" />
        <button class="get-started-btn" type="button">Get Started</button>
      </div>
    </div>
  </section>

  <script src="intro2.js"></script>
</body>
</html>
